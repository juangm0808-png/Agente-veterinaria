<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Veterinaria Huella</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 420px;
            height: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-header {
            background-color: #2e7d32;
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        #chat-header span {
            font-size: 13px;
            font-weight: normal;
            opacity: 0.85;
            display: block;
        }

        #mensajes {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mensaje {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .mensaje.usuario {
            background-color: #2e7d32;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .mensaje.max {
            background-color: #f1f1f1;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        #input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
            gap: 8px;
        }

        #input-texto {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        #input-texto:focus {
            border-color: #2e7d32;
        }

        #btn-enviar {
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 14px;
        }

        #btn-enviar:hover {
            background-color: #1b5e20;
        }

        .escribiendo {
            font-size: 13px;
            color: #999;
            align-self: flex-start;
            padding: 6px 14px;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">
            🐾 Clínica Veterinaria Huella
            <span>Asistente virtual Max</span>
        </div>
        <div id="mensajes">
            <div class="mensaje max">¡Hola! Soy Max, el asistente virtual de la Clínica Veterinaria Huella. ¿En qué puedo ayudarte hoy?</div>
        </div>
        <div id="input-area">
            <input type="text" id="input-texto" placeholder="Escribe tu mensaje..." />
            <button id="btn-enviar">Enviar</button>
        </div>
    </div>

    <script>
        const mensajesDiv = document.getElementById("mensajes");
        const inputTexto = document.getElementById("input-texto");
        const btnEnviar = document.getElementById("btn-enviar");
        const sessionId = "usuario_" + Math.random().toString(36).substr(2, 9);

        function añadirMensaje(texto, tipo) {
            const div = document.createElement("div");
            div.classList.add("mensaje", tipo);
            div.textContent = texto;
            mensajesDiv.appendChild(div);
            mensajesDiv.scrollTop = mensajesDiv.scrollHeight;
        }

        function mostrarEscribiendo() {
            const div = document.createElement("div");
            div.classList.add("escribiendo");
            div.id = "escribiendo";
            div.textContent = "Max está escribiendo...";
            mensajesDiv.appendChild(div);
            mensajesDiv.scrollTop = mensajesDiv.scrollHeight;
        }

        function quitarEscribiendo() {
            const div = document.getElementById("escribiendo");
            if (div) div.remove();
        }

        async function enviarMensaje() {
            const texto = inputTexto.value.trim();
            if (!texto) return;

            añadirMensaje(texto, "usuario");
            inputTexto.value = "";
            btnEnviar.disabled = true;
            mostrarEscribiendo();

            try {
                const respuesta = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mensaje: texto, session_id: sessionId })
                });
                const datos = await respuesta.json();
                quitarEscribiendo();
                añadirMensaje(datos.respuesta, "max");
            } catch (error) {
                quitarEscribiendo();
                añadirMensaje("Ha ocurrido un error. Inténtalo de nuevo.", "max");
            }

            btnEnviar.disabled = false;
            inputTexto.focus();
        }

        btnEnviar.addEventListener("click", enviarMensaje);
        inputTexto.addEventListener("keypress", (e) => {
            if (e.key === "Enter") enviarMensaje();
        });
    </script>
</body>
</html>
